<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
    padding: 12px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  body::-webkit-scrollbar { width: 4px; }
  body::-webkit-scrollbar-thumb { background: #2a2a2a; }

  /* ── Groupes ──────────────────────────────────── */
  .group { margin-bottom: 18px; }

  .group-title {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #3a3a3a;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #222;
  }

  /* ── Liens ────────────────────────────────────── */
  a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 4px;
    color: #8a8a8a;
    text-decoration: none;
    font-size: 11.5px;
    border-radius: 3px;
    transition: color 0.12s, background 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  a:hover { color: #cccccc; background: rgba(255,255,255,0.04); }

  a .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<script>
/* ════════════════════════════════════════════
   CONFIGURATION DES LIENS
   Modifiez ce tableau pour personnaliser.
   ════════════════════════════════════════════ */
const LIENS = [
  {
    groupe: "Outils",
    items: [
      { label: "GitHub",          url: "https://github.com"           },
      { label: "GitHub Pages",    url: "https://pages.github.com"     },
      { label: "VS Code Web",     url: "https://vscode.dev"           }
    ]
  },
  {
    groupe: "Références",
    items: [
      { label: "MDN Web Docs",    url: "https://developer.mozilla.org" },
      { label: "Can I use",       url: "https://caniuse.com"           },
      { label: "CSS Tricks",      url: "https://css-tricks.com"        }
    ]
  },
  {
    groupe: "Autre",
    items: [
      { label: "Lien exemple",    url: "https://example.com"          }
    ]
  }
];
/* ════════════════════════════════════════════ */

LIENS.forEach(g => {
  const div = document.createElement('div');
  div.className = 'group';

  const title = document.createElement('div');
  title.className = 'group-title';
  title.textContent = g.groupe;
  div.appendChild(title);

  g.items.forEach(item => {
    const a = document.createElement('a');
    a.href   = item.url;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';

    const dot = document.createElement('span');
    dot.className = 'dot';
    a.appendChild(dot);
    a.append(item.label);
    div.appendChild(a);
  });

  document.body.appendChild(div);
});
</script>
</body>
</html>
