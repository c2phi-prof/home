<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  textarea {
    flex: 1;
    width: 100%;
    height: 100%;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    color: #c8c8c8;
    font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 14px 16px;
    caret-color: #888;
    /* scrollbar minimaliste */
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  textarea::placeholder { color: #333; }

  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  #status {
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: #2a2a2a;
    text-align: right;
    padding: 3px 10px 5px;
    transition: color 0.4s;
  }

  #status.saved { color: #3a6a3a; }
</style>
</head>
<body>
  <textarea id="ta" placeholder="Notes…" spellcheck="false"></textarea>
  <div id="status">·</div>

<script>
/* Clé unique basée sur le chemin du widget */
const KEY = 'note::' + location.pathname;

const ta     = document.getElementById('ta');
const status = document.getElementById('status');

/* Chargement */
ta.value = localStorage.getItem(KEY) || '';

/* Sauvegarde automatique */
let timer;
ta.addEventListener('input', () => {
  status.className = '';
  status.textContent = '…';
  clearTimeout(timer);
  timer = setTimeout(save, 800);
});

function save() {
  localStorage.setItem(KEY, ta.value);
  status.textContent = 'sauvegardé';
  status.className = 'saved';
  setTimeout(() => { status.textContent = '·'; status.className = ''; }, 1500);
}

/* Ctrl+S */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); save(); }
});
</script>
</body>
</html>
